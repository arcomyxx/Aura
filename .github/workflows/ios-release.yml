name: iOS Release (TestFlight)

# Declenche a la main depuis l'onglet Actions (pas a chaque push).
on:
  workflow_dispatch:

jobs:
  testflight:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Grant gradlew permissions
        run: chmod +x gradlew

      - name: CocoaPods install
        working-directory: iosApp
        run: pod install

      # Reconstruit le .p8 a partir du secret, qu'il soit colle en clair (PEM) ou en base64.
      - name: Decode App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          if printf '%s' "$ASC_KEY_CONTENT" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s' "$ASC_KEY_CONTENT" > "$RUNNER_TEMP/asc/AuthKey.p8"
          else
            printf '%s' "$ASC_KEY_CONTENT" | openssl base64 -d -A > "$RUNNER_TEMP/asc/AuthKey.p8" 2>/dev/null || true
          fi
          if grep -q "BEGIN PRIVATE KEY" "$RUNNER_TEMP/asc/AuthKey.p8"; then
            echo "Cle .p8 valide."
          else
            echo "ERREUR: ASC_KEY_CONTENT n'est ni un .p8 brut ni un base64 de .p8 valide. Recree le secret."
            exit 1
          fi

      # Le Team ID doit etre l'identifiant a 10 caracteres, pas un nom.
      - name: Verifier le Team ID
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if printf '%s' "$APPLE_TEAM_ID" | grep -qE '^[A-Z0-9]{10}$'; then
            echo "Team ID au bon format."
          else
            echo "ERREUR: APPLE_TEAM_ID doit etre l'identifiant a 10 caracteres (ex: A1B2C3D4E5), pas un nom. Corrige le secret."
            exit 1
          fi

      - name: Build & upload to TestFlight (Fastlane)
        working-directory: iosApp
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ runner.temp }}/asc/AuthKey.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: fastlane beta
